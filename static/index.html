<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tweet Views Automation</title>
<style>
  :root { --bg:#0b0e13; --card:#151a23; --line:#222b38; --txt:#e6edf3; --muted:#8b98a9; --acc:#3ba1ff; --ok:#2ec27e; --bad:#ff5d5d; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Inter,sans-serif; background:var(--bg); color:var(--txt); }
  header { padding:20px 24px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:12px; }
  h1 { font-size:18px; margin:0; }
  .wrap { max-width:980px; margin:0 auto; padding:24px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px; margin-bottom:18px; }
  .card h2 { font-size:14px; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:0 0 14px; }
  input, button { font:inherit; }
  input { background:#0e131b; border:1px solid var(--line); color:var(--txt); border-radius:8px; padding:9px 11px; }
  button { background:var(--acc); color:#03121f; border:none; border-radius:8px; padding:9px 14px; font-weight:600; cursor:pointer; }
  button.ghost { background:transparent; color:var(--muted); border:1px solid var(--line); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:9px 8px; border-bottom:1px solid var(--line); }
  th { color:var(--muted); font-weight:500; font-size:12px; }
  .pill { font-size:12px; padding:2px 8px; border-radius:999px; border:1px solid var(--line); }
  .on { color:var(--ok); border-color:#1f4d39; }
  .off { color:var(--muted); }
  a { color:var(--acc); text-decoration:none; }
  .muted { color:var(--muted); font-size:13px; }
  .topbar input { width:280px; }
  .stat { font-size:22px; font-weight:700; }
</style>
</head>
<body>
<header>
  <h1>🐦 → 👁️ Tweet Views Automation</h1>
  <div class="topbar row">
    <input id="token" type="password" placeholder="Admin token" />
    <button onclick="saveToken()">Connect</button>
  </div>
</header>

<div class="wrap">
  <div class="card">
    <h2>Status</h2>
    <div class="row" style="gap:40px">
      <div><div class="muted">Panel balance</div><div class="stat" id="balance">—</div></div>
      <div><div class="muted">Tracked accounts</div><div class="stat" id="acctCount">—</div></div>
      <div style="margin-left:auto" class="row">
        <button class="ghost" onclick="pollNow()">Poll now</button>
        <button class="ghost" onclick="refresh()">Refresh</button>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Add account</h2>
    <div class="row">
      <input id="newUser" placeholder="@username" style="width:200px" />
      <input id="newMin" placeholder="min qty (opt)" style="width:130px" />
      <input id="newMax" placeholder="max qty (opt)" style="width:130px" />
      <input id="newSvc" placeholder="service id (opt)" style="width:150px" />
      <button onclick="addAccount()">Track</button>
    </div>
    <p class="muted" style="margin:12px 0 0">New accounts are baselined on add — only tweets posted <em>after</em> you add them get orders.</p>
  </div>

  <div class="card">
    <h2>Accounts</h2>
    <table><thead><tr><th>Account</th><th>Status</th><th>Qty range</th><th>Last tweet id</th><th></th></tr></thead>
    <tbody id="accts"><tr><td colspan="5" class="muted">Connect with your admin token…</td></tr></tbody></table>
  </div>

  <div class="card">
    <h2>Recent orders</h2>
    <table><thead><tr><th>When</th><th>Account</th><th>Qty</th><th>Order #</th><th>Tweet</th></tr></thead>
    <tbody id="orders"><tr><td colspan="5" class="muted">—</td></tr></tbody></table>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let TOKEN = localStorage.getItem("admintok") || "";
$("token").value = TOKEN;

function saveToken(){ TOKEN = $("token").value.trim(); localStorage.setItem("admintok", TOKEN); refresh(); }

async function api(path, opts={}){
  const res = await fetch("/api"+path, {...opts, headers:{ "Content-Type":"application/json", "X-Admin-Token": TOKEN, ...(opts.headers||{}) }});
  if(!res.ok) throw new Error((await res.json().catch(()=>({}))).detail || res.status);
  return res.json();
}

async function refresh(){
  try {
    const accts = await api("/accounts");
    $("acctCount").textContent = accts.length;
    $("accts").innerHTML = accts.map(a => `
      <tr>
        <td><a href="https://x.com/${a.username}" target="_blank">@${a.username}</a></td>
        <td><span class="pill ${a.enabled?'on':'off'}">${a.enabled?'live':'paused'}</span></td>
        <td>${a.min_qty||'def'}–${a.max_qty||'def'}</td>
        <td class="muted">${a.last_tweet_id||'pending baseline'}</td>
        <td class="row" style="justify-content:flex-end">
          <button class="ghost" onclick="toggle('${a.username}', ${!a.enabled})">${a.enabled?'pause':'resume'}</button>
          <button class="ghost" onclick="del('${a.username}')">remove</button>
        </td>
      </tr>`).join("") || `<tr><td colspan="5" class="muted">No accounts yet.</td></tr>`;

    const orders = await api("/orders?limit=50");
    $("orders").innerHTML = orders.map(o => `
      <tr>
        <td class="muted">${new Date(o.created_at).toLocaleString()}</td>
        <td>@${o.username}</td>
        <td>${o.quantity}</td>
        <td>${o.order_id}</td>
        <td><a href="${o.tweet_url}" target="_blank">view</a></td>
      </tr>`).join("") || `<tr><td colspan="5" class="muted">No orders yet.</td></tr>`;

    try { const b = await api("/balance"); $("balance").textContent = `${b.balance} ${b.currency||''}`; } catch(e){}
  } catch(e){ alert("Error: "+e.message); }
}

async function addAccount(){
  const body = { username: $("newUser").value, enabled:true };
  if($("newMin").value) body.min_qty = +$("newMin").value;
  if($("newMax").value) body.max_qty = +$("newMax").value;
  if($("newSvc").value) body.service_id = +$("newSvc").value;
  try { await api("/accounts", {method:"POST", body:JSON.stringify(body)}); $("newUser").value=""; refresh(); }
  catch(e){ alert("Error: "+e.message); }
}
async function toggle(u, on){ await api("/accounts/"+u, {method:"PATCH", body:JSON.stringify({enabled:on})}); refresh(); }
async function del(u){ if(confirm("Stop tracking @"+u+"?")){ await api("/accounts/"+u, {method:"DELETE"}); refresh(); } }
async function pollNow(){ try{ await api("/poll-now",{method:"POST"}); refresh(); }catch(e){ alert(e.message); } }

if(TOKEN) refresh();
</script>
</body>
</html>
